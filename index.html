<!DOCTYPE html>
<html lang="ms">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sistem Pengurusan Produk</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="container">

  <h1>Sistem Pengurusan Produk</h1>

  <!-- BORANG -->
  <form id="productForm">
    <input type="text" id="name" placeholder="Nama Produk" required>
    <input type="text" id="category" placeholder="Kategori" required>
    <input type="number" id="price" placeholder="Harga" required>
    <button type="submit">Tambah</button>
  </form>

  <!-- JADUAL -->
  <table>
    <thead>
      <tr>
        <th>Nama</th>
        <th>Kategori</th>
        <th >Harga (RM)</th>
        <th>Tindakan</th>
      </tr>
    </thead>
    <tbody id="productTable"></tbody>
  </table>

</div>

<script src="js/app.js"></script>

</body>
</html>
